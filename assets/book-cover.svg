<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 560" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Clip paths for 4 panels -->
    <clipPath id="cp1"><rect x="0"    y="0" width="360" height="560"/></clipPath>
    <clipPath id="cp2"><rect x="360"  y="0" width="360" height="560"/></clipPath>
    <clipPath id="cp3"><rect x="720"  y="0" width="360" height="560"/></clipPath>
    <clipPath id="cp4"><rect x="1080" y="0" width="360" height="560"/></clipPath>

    <!-- Fade-to-transparent masks on left and right edges -->
    <linearGradient id="fadeX" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="black" stop-opacity="0"/>
      <stop offset="8%"   stop-color="black" stop-opacity="1"/>
      <stop offset="92%"  stop-color="black" stop-opacity="1"/>
      <stop offset="100%" stop-color="black" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeY" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="black" stop-opacity="0.4"/>
      <stop offset="15%"  stop-color="black" stop-opacity="1"/>
      <stop offset="85%"  stop-color="black" stop-opacity="1"/>
      <stop offset="100%" stop-color="black" stop-opacity="0.3"/>
    </linearGradient>
    <mask id="edgeFade">
      <rect width="1440" height="560" fill="url(#fadeX)"/>
    </mask>

    <!-- Satellite terrain gradient (panel 4) -->
    <radialGradient id="terrainGrad" cx="55%" cy="45%" r="55%">
      <stop offset="0%"   stop-color="#3a6b3a"/>
      <stop offset="30%"  stop-color="#8b7355"/>
      <stop offset="60%"  stop-color="#6b5a40"/>
      <stop offset="100%" stop-color="#4a3d2a"/>
    </radialGradient>
    <linearGradient id="waterGradSat" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#1a9a7a"/>
      <stop offset="100%" stop-color="#0d6b55"/>
    </linearGradient>
  </defs>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PANEL 1 — Light / Minimal (grey palette)               -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g clip-path="url(#cp1)">
    <!-- Background tint -->
    <rect x="0" y="0" width="360" height="560" fill="#d0dce8" opacity="0.25"/>

    <!-- Grid lines – city blocks -->
    <g stroke="#8099b0" stroke-width="0.5" opacity="0.5">
      <line x1="0"   y1="80"  x2="360" y2="80"/>
      <line x1="0"   y1="160" x2="360" y2="160"/>
      <line x1="0"   y1="240" x2="360" y2="240"/>
      <line x1="0"   y1="320" x2="360" y2="320"/>
      <line x1="0"   y1="400" x2="360" y2="400"/>
      <line x1="0"   y1="480" x2="360" y2="480"/>
      <line x1="72"  y1="0"   x2="72"  y2="560"/>
      <line x1="144" y1="0"   x2="144" y2="560"/>
      <line x1="216" y1="0"   x2="216" y2="560"/>
      <line x1="288" y1="0"   x2="288" y2="560"/>
    </g>

    <!-- Subdivision roads (finer grid) -->
    <g stroke="#a0b4c4" stroke-width="0.3" opacity="0.35">
      <line x1="0"   y1="40"  x2="360" y2="40"/>
      <line x1="0"   y1="120" x2="360" y2="120"/>
      <line x1="0"   y1="200" x2="360" y2="200"/>
      <line x1="0"   y1="280" x2="360" y2="280"/>
      <line x1="0"   y1="360" x2="360" y2="360"/>
      <line x1="0"   y1="440" x2="360" y2="440"/>
      <line x1="36"  y1="0"   x2="36"  y2="560"/>
      <line x1="108" y1="0"   x2="108" y2="560"/>
      <line x1="180" y1="0"   x2="180" y2="560"/>
      <line x1="252" y1="0"   x2="252" y2="560"/>
      <line x1="324" y1="0"   x2="324" y2="560"/>
    </g>

    <!-- Great Salt Lake – light style -->
    <path d="M 118,22 L 158,22 L 163,28 L 163,128
             L 260,128 C 292,130 305,155 295,192
             C 285,229 252,258 200,264
             C 148,270 100,252 72,220
             C 44,188 42,155 58,130
             L 113,128 L 113,28 Z"
          fill="#5a9fd4" opacity="0.35"/>

    <!-- Causeway line -->
    <line x1="113" y1="130" x2="163" y2="130" stroke="#a0b8c8" stroke-width="2" opacity="0.6"/>

    <!-- I-15 highway -->
    <path d="M 248,0 C 246,80 242,180 236,280 C 232,360 228,440 224,560"
          stroke="#8899aa" stroke-width="2.5" fill="none" opacity="0.6"/>
    <path d="M 248,0 C 246,80 242,180 236,280 C 232,360 228,440 224,560"
          stroke="#ccdde8" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- US-89 secondary road -->
    <path d="M 200,0 C 202,80 205,160 210,240 C 215,320 218,400 220,560"
          stroke="#a0b4c4" stroke-width="1.5" fill="none" opacity="0.45"/>

    <!-- SLC marker -->
    <circle cx="234" cy="310" r="7" fill="#334455" opacity="0.55"/>
    <circle cx="234" cy="310" r="3" fill="#ddeeff" opacity="0.85"/>

    <!-- Small city dots -->
    <circle cx="192" cy="160" r="3" fill="#4466aa" opacity="0.45"/>
    <circle cx="260" cy="205" r="2.5" fill="#4466aa" opacity="0.4"/>
    <circle cx="226" cy="85"  r="2" fill="#bb3366" opacity="0.6"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PANEL 2 — Dark / Night                                 -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g clip-path="url(#cp2)" transform="translate(360,0)">
    <!-- Background tint – darker -->
    <rect x="0" y="0" width="360" height="560" fill="#0a1520" opacity="0.6"/>

    <!-- Grid lines – pale on dark -->
    <g stroke="#2a4060" stroke-width="0.5" opacity="0.7">
      <line x1="0"   y1="80"  x2="360" y2="80"/>
      <line x1="0"   y1="160" x2="360" y2="160"/>
      <line x1="0"   y1="240" x2="360" y2="240"/>
      <line x1="0"   y1="320" x2="360" y2="320"/>
      <line x1="0"   y1="400" x2="360" y2="400"/>
      <line x1="0"   y1="480" x2="360" y2="480"/>
      <line x1="72"  y1="0"   x2="72"  y2="560"/>
      <line x1="144" y1="0"   x2="144" y2="560"/>
      <line x1="216" y1="0"   x2="216" y2="560"/>
      <line x1="288" y1="0"   x2="288" y2="560"/>
    </g>

    <!-- Fine grid -->
    <g stroke="#1a2f44" stroke-width="0.3" opacity="0.6">
      <line x1="0"   y1="40"  x2="360" y2="40"/>
      <line x1="0"   y1="120" x2="360" y2="120"/>
      <line x1="0"   y1="200" x2="360" y2="200"/>
      <line x1="0"   y1="280" x2="360" y2="280"/>
      <line x1="0"   y1="360" x2="360" y2="360"/>
      <line x1="0"   y1="440" x2="360" y2="440"/>
      <line x1="36"  y1="0"   x2="36"  y2="560"/>
      <line x1="108" y1="0"   x2="108" y2="560"/>
      <line x1="180" y1="0"   x2="180" y2="560"/>
      <line x1="252" y1="0"   x2="252" y2="560"/>
      <line x1="324" y1="0"   x2="324" y2="560"/>
    </g>

    <!-- Great Salt Lake – dark style -->
    <path d="M 118,22 L 158,22 L 163,28 L 163,128
             L 260,128 C 292,130 305,155 295,192
             C 285,229 252,258 200,264
             C 148,270 100,252 72,220
             C 44,188 42,155 58,130
             L 113,128 L 113,28 Z"
          fill="#0d2d4a" opacity="0.9"/>
    <path d="M 118,22 L 158,22 L 163,28 L 163,128
             L 260,128 C 292,130 305,155 295,192
             C 285,229 252,258 200,264
             C 148,270 100,252 72,220
             C 44,188 42,155 58,130
             L 113,128 L 113,28 Z"
          fill="none" stroke="#1a5080" stroke-width="1" opacity="0.7"/>

    <!-- Causeway -->
    <line x1="113" y1="130" x2="163" y2="130" stroke="#2a6090" stroke-width="2" opacity="0.7"/>

    <!-- I-15 – glowing white -->
    <path d="M 248,0 C 246,80 242,180 236,280 C 232,360 228,440 224,560"
          stroke="#ffffff" stroke-width="3.5" fill="none" opacity="0.18"/>
    <path d="M 248,0 C 246,80 242,180 236,280 C 232,360 228,440 224,560"
          stroke="#ccddff" stroke-width="1.5" fill="none" opacity="0.6"/>

    <!-- Secondary road -->
    <path d="M 200,0 C 202,80 205,160 210,240 C 215,320 218,400 220,560"
          stroke="#445566" stroke-width="1.5" fill="none" opacity="0.7"/>

    <!-- SLC marker – glowing -->
    <circle cx="234" cy="310" r="10" fill="#0ea5e9" opacity="0.15"/>
    <circle cx="234" cy="310" r="6"  fill="#1a3050" opacity="0.85"/>
    <circle cx="234" cy="310" r="3"  fill="#e0f0ff" opacity="0.9"/>

    <!-- City dots -->
    <circle cx="192" cy="160" r="3" fill="#3366cc" opacity="0.6"/>
    <circle cx="260" cy="205" r="2.5" fill="#3366cc" opacity="0.55"/>
    <circle cx="226" cy="85"  r="3" fill="#ff5599" opacity="0.7"/>
    <circle cx="226" cy="85"  r="6" fill="#ff5599" opacity="0.12"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PANEL 3 — Standard / Topo                              -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g clip-path="url(#cp3)" transform="translate(720,0)">
    <!-- Background – warm beige/tan -->
    <rect x="0" y="0" width="360" height="560" fill="#e8e0cc" opacity="0.3"/>

    <!-- Topo contour lines (organic curves) -->
    <g stroke="#c8b888" stroke-width="0.5" fill="none" opacity="0.45">
      <path d="M 0,180 C 60,170 120,185 180,175 C 240,165 300,180 360,170"/>
      <path d="M 0,220 C 60,210 120,225 180,215 C 240,205 300,220 360,210"/>
      <path d="M 0,260 C 60,252 120,265 180,255 C 240,245 300,258 360,250"/>
      <path d="M 0,380 C 60,372 120,385 180,375 C 240,365 300,378 360,370"/>
      <path d="M 0,420 C 60,412 120,425 180,415 C 240,405 300,418 360,410"/>
      <path d="M 0,460 C 60,452 120,465 180,455 C 240,445 300,458 360,450"/>
    </g>

    <!-- Regular grid (lighter) -->
    <g stroke="#b8a888" stroke-width="0.4" opacity="0.35">
      <line x1="0"   y1="80"  x2="360" y2="80"/>
      <line x1="0"   y1="160" x2="360" y2="160"/>
      <line x1="0"   y1="240" x2="360" y2="240"/>
      <line x1="0"   y1="320" x2="360" y2="320"/>
      <line x1="0"   y1="400" x2="360" y2="400"/>
      <line x1="0"   y1="480" x2="360" y2="480"/>
      <line x1="72"  y1="0"   x2="72"  y2="560"/>
      <line x1="144" y1="0"   x2="144" y2="560"/>
      <line x1="216" y1="0"   x2="216" y2="560"/>
      <line x1="288" y1="0"   x2="288" y2="560"/>
    </g>

    <!-- Great Salt Lake – bright blue water -->
    <path d="M 118,22 L 158,22 L 163,28 L 163,128
             L 260,128 C 292,130 305,155 295,192
             C 285,229 252,258 200,264
             C 148,270 100,252 72,220
             C 44,188 42,155 58,130
             L 113,128 L 113,28 Z"
          fill="#4da8e8" opacity="0.65"/>
    <path d="M 118,22 L 158,22 L 163,28 L 163,128
             L 260,128 C 292,130 305,155 295,192
             C 285,229 252,258 200,264
             C 148,270 100,252 72,220
             C 44,188 42,155 58,130
             L 113,128 L 113,28 Z"
          fill="none" stroke="#2288cc" stroke-width="1" opacity="0.6"/>

    <!-- Causeway (raised road line) -->
    <line x1="113" y1="130" x2="163" y2="130" stroke="#cc8833" stroke-width="2.5" opacity="0.7"/>

    <!-- I-15 – standard highway orange -->
    <path d="M 248,0 C 246,80 242,180 236,280 C 232,360 228,440 224,560"
          stroke="#e8a030" stroke-width="3.5" fill="none" opacity="0.55"/>
    <path d="M 248,0 C 246,80 242,180 236,280 C 232,360 228,440 224,560"
          stroke="#ffffff" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- Secondary road -->
    <path d="M 200,0 C 202,80 205,160 210,240 C 215,320 218,400 220,560"
          stroke="#d0a050" stroke-width="2" fill="none" opacity="0.5"/>

    <!-- SLC marker -->
    <circle cx="234" cy="310" r="7" fill="#222233" opacity="0.65"/>
    <circle cx="234" cy="310" r="3" fill="#ffffff" opacity="0.9"/>

    <!-- City dots -->
    <circle cx="192" cy="160" r="3"   fill="#2255aa" opacity="0.55"/>
    <circle cx="260" cy="205" r="2.5" fill="#2255aa" opacity="0.5"/>
    <circle cx="226" cy="85"  r="3"   fill="#cc3366" opacity="0.7"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- PANEL 4 — Satellite                                    -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g clip-path="url(#cp4)" transform="translate(1080,0)">
    <!-- Terrain background – earthy tones -->
    <rect x="0" y="0" width="360" height="560" fill="url(#terrainGrad)" opacity="0.5"/>

    <!-- Organic terrain patches -->
    <path d="M 0,300 C 40,280 80,310 120,295 C 160,280 200,300 240,285 C 280,270 320,290 360,275 L 360,560 L 0,560 Z"
          fill="#5a4830" opacity="0.35"/>
    <path d="M 0,380 C 50,360 100,385 150,370 C 200,355 250,375 300,360 C 325,352 345,360 360,355 L 360,560 L 0,560 Z"
          fill="#4a3a28" opacity="0.3"/>

    <!-- No grid — organic terrain contours instead -->
    <g stroke="#7a6a50" stroke-width="0.6" fill="none" opacity="0.4">
      <path d="M 0,290 C 50,278 100,295 150,282 C 200,269 250,285 300,272 C 325,265 345,270 360,265"/>
      <path d="M 0,340 C 50,328 100,345 150,332 C 200,319 250,335 300,322 C 325,315 345,320 360,315"/>
      <path d="M 0,390 C 50,378 100,395 150,382 C 200,369 250,385 300,372 C 325,365 345,370 360,365"/>
      <path d="M 0,440 C 50,428 100,445 150,432 C 200,419 250,435 300,422"/>
    </g>

    <!-- Great Salt Lake – turquoise/teal (as seen in satellite) -->
    <path d="M 118,22 L 158,22 L 163,28 L 163,128
             L 260,128 C 292,130 305,155 295,192
             C 285,229 252,258 200,264
             C 148,270 100,252 72,220
             C 44,188 42,155 58,130
             L 113,128 L 113,28 Z"
          fill="url(#waterGradSat)" opacity="0.75"/>

    <!-- Shoreline mineral deposits / salt flats -->
    <path d="M 118,22 L 158,22 L 163,28 L 163,128
             L 260,128 C 292,130 305,155 295,192
             C 285,229 252,258 200,264
             C 148,270 100,252 72,220
             C 44,188 42,155 58,130
             L 113,128 L 113,28 Z"
          fill="none" stroke="#a8d8c0" stroke-width="1.5" opacity="0.5"/>

    <!-- Causeway – visible satellite stripe -->
    <line x1="113" y1="130" x2="163" y2="130" stroke="#e8d8a0" stroke-width="3" opacity="0.6"/>

    <!-- I-15 – thin road visible on satellite -->
    <path d="M 248,0 C 246,80 242,180 236,280 C 232,360 228,440 224,560"
          stroke="#d0c090" stroke-width="2" fill="none" opacity="0.55"/>

    <!-- SLC marker – white ring -->
    <circle cx="234" cy="310" r="9"  fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.6"/>
    <circle cx="234" cy="310" r="3"  fill="#ffffff" opacity="0.85"/>

    <!-- City/industrial dots -->
    <circle cx="192" cy="160" r="3"   fill="#88ddcc" opacity="0.5"/>
    <circle cx="260" cy="205" r="2.5" fill="#88ddcc" opacity="0.45"/>
    <circle cx="226" cy="85"  r="3"   fill="#ff6688" opacity="0.7"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Panel dividers                                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <g stroke="#4a7aaa" stroke-width="0.75" opacity="0.4">
    <line x1="360"  y1="0" x2="360"  y2="560"/>
    <line x1="720"  y1="0" x2="720"  y2="560"/>
    <line x1="1080" y1="0" x2="1080" y2="560"/>
  </g>

  <!-- ═══════════════════════════════════════════════════════ -->
  <!-- Edge fade mask over everything                         -->
  <!-- ═══════════════════════════════════════════════════════ -->
  <rect width="1440" height="560" fill="url(#fadeX)" style="mix-blend-mode:multiply"/>
</svg>
