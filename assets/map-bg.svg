<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 600" preserveAspectRatio="xMidYMid slice">
  <defs>
    <!-- Minor street grid, slightly rotated like a real city block layout -->
    <pattern id="minorStreets" x="0" y="0" width="48" height="48"
             patternTransform="rotate(7 720 300)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0"  y2="48" stroke="#0a2030" stroke-width="0.6"/>
      <line x1="0" y1="0" x2="48" y2="0"  stroke="#0a2030" stroke-width="0.6"/>
    </pattern>

    <!-- Secondary street grid, same rotation -->
    <pattern id="secStreets" x="0" y="0" width="192" height="192"
             patternTransform="rotate(7 720 300)" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="0"   y2="192" stroke="#143558" stroke-width="1.2"/>
      <line x1="0" y1="0" x2="192" y2="0"   stroke="#143558" stroke-width="1.2"/>
    </pattern>

    <!-- Neon blue glow filter for arterials -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Orange glow filter for highways -->
    <filter id="orangeGlow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Node glow filter -->
    <filter id="nodeGlow" x="-200%" y="-200%" width="500%" height="500%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Radial fade masks for edges -->
    <linearGradient id="fadeLeft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"  stop-color="black" stop-opacity="1"/>
      <stop offset="12%" stop-color="black" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeRight" x1="100%" y1="0%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="black" stop-opacity="1"/>
      <stop offset="12%" stop-color="black" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"  stop-color="black" stop-opacity="0.7"/>
      <stop offset="18%" stop-color="black" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="fadeBottom" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"  stop-color="black" stop-opacity="0.6"/>
      <stop offset="18%" stop-color="black" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- ── Base grid layers ───────────────────────────────────────────────────── -->
  <rect width="1440" height="600" fill="url(#minorStreets)"  opacity="0.9"/>
  <rect width="1440" height="600" fill="url(#secStreets)"    opacity="0.75"/>

  <!-- ── Water features ────────────────────────────────────────────────────── -->
  <!-- River / waterway snaking across lower portion -->
  <path d="M -20,480 C 80,460 160,495 260,472 C 360,449 420,480 520,465
           C 620,450 680,478 780,462 C 880,446 940,470 1060,455
           C 1160,442 1240,465 1380,448 L 1460,448 L 1460,600 L -20,600 Z"
        fill="#051520" opacity="0.9"/>
  <path d="M -20,480 C 80,460 160,495 260,472 C 360,449 420,480 520,465
           C 620,450 680,478 780,462 C 880,446 940,470 1060,455
           C 1160,442 1240,465 1380,448"
        stroke="#0a4060" stroke-width="1.5" fill="none" opacity="0.8"/>
  <!-- River highlight (neon edge) -->
  <path d="M -20,480 C 80,460 160,495 260,472 C 360,449 420,480 520,465
           C 620,450 680,478 780,462 C 880,446 940,470 1060,455
           C 1160,442 1240,465 1380,448"
        stroke="#06b6d4" stroke-width="0.8" fill="none" opacity="0.5"/>

  <!-- Lake / reservoir (upper left) -->
  <path d="M 60,40 C 90,28 125,32 145,48 C 165,64 168,88 158,108
           C 148,128 125,138 100,132 C 75,126 52,108 48,85
           C 44,62 48,48 60,40 Z"
        fill="#04121e" opacity="0.9"/>
  <path d="M 60,40 C 90,28 125,32 145,48 C 165,64 168,88 158,108
           C 148,128 125,138 100,132 C 75,126 52,108 48,85
           C 44,62 48,48 60,40 Z"
        stroke="#0ea5e9" stroke-width="1" fill="none" opacity="0.5"/>

  <!-- Small inlet / creek -->
  <path d="M 145,80 C 200,72 260,85 310,78" stroke="#0a3a50" stroke-width="2" fill="none" opacity="0.7"/>
  <path d="M 145,80 C 200,72 260,85 310,78" stroke="#06b6d4" stroke-width="0.7" fill="none" opacity="0.4"/>

  <!-- ── Minor local roads (dim, thin, many) ─────────────────────────────── -->
  <g stroke="#0f2840" stroke-width="0.8" fill="none" opacity="0.7">
    <!-- Diagonal streets cutting across grid -->
    <path d="M 340,0   C 360,100 375,200 385,300 C 395,400 400,500 405,600"/>
    <path d="M 720,0   C 718,100 715,200 712,300 C 709,400 706,500 703,600"/>
    <path d="M 1080,0  C 1082,100 1085,200 1088,300 C 1091,400 1094,500 1097,600"/>
    <path d="M 0,150   C 200,148 400,152 600,150 C 800,148 1000,152 1200,150 C 1300,149 1380,150 1440,150"/>
    <path d="M 0,300   C 200,298 400,302 600,300 C 800,298 1000,302 1200,300 C 1300,299 1380,300 1440,300"/>
    <path d="M 0,450   C 200,448 400,452 600,450 C 800,448 1000,452 1200,450 C 1300,449 1380,450 1440,450"/>
    <!-- Diagonal cut-throughs -->
    <path d="M 0,80  L 220,300"/>
    <path d="M 0,250 L 180,480"/>
    <path d="M 440,0 L 680,300 L 740,600"/>
    <path d="M 900,0 L 1100,260 L 1200,600"/>
    <path d="M 1200,0 L 1380,200"/>
    <path d="M 1440,120 L 1260,300 L 1380,600"/>
  </g>

  <!-- ── Secondary arterials (medium blue, readable) ─────────────────────── -->
  <g stroke="#1a5580" stroke-width="1.8" fill="none" opacity="0.75">
    <path d="M 0,200    C 300,196 600,204 900,200 C 1100,197 1300,202 1440,200"/>
    <path d="M 0,400    C 300,396 600,404 900,400 C 1100,397 1300,402 1440,400"/>
    <path d="M 480,0    C 478,150 476,300 474,450 C 472,520 471,560 470,600"/>
    <path d="M 960,0    C 962,150 964,300 966,450 C 968,520 969,560 970,600"/>
    <!-- Grid diagonals -->
    <path d="M 160,0   C 200,60 260,140 320,220 C 380,300 460,380 540,460 C 590,510 630,550 660,600"/>
    <path d="M 820,0   C 860,80 910,170 950,260 C 990,350 1020,440 1050,530 C 1062,560 1070,580 1080,600"/>
    <path d="M 0,30    C 100,60 200,110 310,180 C 420,250 500,300 560,360"/>
    <path d="M 0,530   C 200,510 400,520 600,510 C 800,500 1000,515 1200,505 C 1300,500 1380,505 1440,505"/>
  </g>

  <!-- ── Primary arterials (bright neon blue, glowing) ────────────────────── -->
  <!-- Glow layer (blurred, wider) -->
  <g stroke="#0ea5e9" stroke-width="6" fill="none" opacity="0.18" filter="url(#blueGlow)">
    <path d="M 0,300    L 1440,300"/>
    <path d="M 720,0    L 720,600"/>
    <path d="M 240,0    C 245,200 248,400 250,600"/>
    <path d="M 1200,0   C 1198,200 1196,400 1194,600"/>
    <path d="M 0,100    C 360,95 720,105 1080,100 C 1200,98 1360,101 1440,100"/>
    <path d="M 0,500    C 360,495 720,505 1080,500 C 1200,498 1360,501 1440,500"/>
  </g>
  <!-- Crisp top layer -->
  <g stroke="#0ea5e9" stroke-width="2" fill="none" opacity="0.8">
    <path d="M 0,300    L 1440,300"/>
    <path d="M 720,0    L 720,600"/>
    <path d="M 240,0    C 245,200 248,400 250,600"/>
    <path d="M 1200,0   C 1198,200 1196,400 1194,600"/>
    <path d="M 0,100    C 360,95 720,105 1080,100 C 1200,98 1360,101 1440,100"/>
    <path d="M 0,500    C 360,495 720,505 1080,500 C 1200,498 1360,501 1440,500"/>
  </g>

  <!-- ── Highway / Interstate (neon orange) ───────────────────────────────── -->
  <!-- Glow layer -->
  <g stroke="#f59e0b" stroke-width="8" fill="none" opacity="0.2" filter="url(#orangeGlow)">
    <!-- Main diagonal freeway (like I-10 / I-15) -->
    <path d="M 1440,60  C 1300,120 1160,180 1020,250 C 880,320 740,380 600,440 C 500,480 380,520 220,580 C 130,608 60,618 -20,630"/>
    <!-- Loop / ring section -->
    <path d="M 580,0    C 640,60 700,150 740,240 C 780,330 790,420 760,500 C 740,550 700,580 660,600"/>
  </g>
  <!-- Crisp highway lines -->
  <g fill="none">
    <!-- Outer casing (slightly wider, darker) -->
    <path d="M 1440,60  C 1300,120 1160,180 1020,250 C 880,320 740,380 600,440 C 500,480 380,520 220,580 C 130,608 60,618 -20,630"
          stroke="#92400e" stroke-width="4.5" opacity="0.6"/>
    <path d="M 580,0    C 640,60 700,150 740,240 C 780,330 790,420 760,500 C 740,550 700,580 660,600"
          stroke="#92400e" stroke-width="4.5" opacity="0.6"/>
    <!-- Bright centre -->
    <path d="M 1440,60  C 1300,120 1160,180 1020,250 C 880,320 740,380 600,440 C 500,480 380,520 220,580 C 130,608 60,618 -20,630"
          stroke="#fbbf24" stroke-width="2.2" opacity="0.9"/>
    <path d="M 580,0    C 640,60 700,150 740,240 C 780,330 790,420 760,500 C 740,550 700,580 660,600"
          stroke="#fbbf24" stroke-width="2.2" opacity="0.9"/>
  </g>

  <!-- ── Intersection nodes / junction glow dots ──────────────────────────── -->
  <!-- Blue nodes at arterial intersections -->
  <g filter="url(#nodeGlow)">
    <circle cx="720"  cy="300" r="5"  fill="#0ea5e9" opacity="0.9"/>
    <circle cx="240"  cy="300" r="3.5" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="1200" cy="300" r="3.5" fill="#0ea5e9" opacity="0.75"/>
    <circle cx="720"  cy="100" r="3"  fill="#0ea5e9" opacity="0.65"/>
    <circle cx="720"  cy="500" r="3"  fill="#0ea5e9" opacity="0.65"/>
    <circle cx="250"  cy="100" r="2.5" fill="#38bdf8" opacity="0.6"/>
    <circle cx="1194" cy="100" r="2.5" fill="#38bdf8" opacity="0.6"/>
  </g>
  <!-- Orange nodes at highway intersections -->
  <g filter="url(#nodeGlow)">
    <circle cx="740"  cy="240" r="5"  fill="#fbbf24" opacity="0.85"/>
    <circle cx="1020" cy="250" r="4"  fill="#f59e0b" opacity="0.75"/>
    <circle cx="600"  cy="440" r="4"  fill="#f59e0b" opacity="0.75"/>
  </g>
  <!-- Crisp dot centres -->
  <circle cx="720"  cy="300" r="3"   fill="#7dd3fc" opacity="0.95"/>
  <circle cx="240"  cy="300" r="2"   fill="#7dd3fc" opacity="0.85"/>
  <circle cx="1200" cy="300" r="2"   fill="#7dd3fc" opacity="0.85"/>
  <circle cx="740"  cy="240" r="2.5" fill="#fde68a" opacity="0.95"/>
  <circle cx="1020" cy="250" r="2"   fill="#fde68a" opacity="0.85"/>
  <circle cx="600"  cy="440" r="2"   fill="#fde68a" opacity="0.85"/>

  <!-- ── Edge fade masks ────────────────────────────────────────────────────── -->
  <rect width="200"  height="600" fill="url(#fadeLeft)"   opacity="1"/>
  <rect x="1240" width="200" height="600" fill="url(#fadeRight)"  opacity="1"/>
  <rect width="1440" height="110" fill="url(#fadeTop)"    opacity="1"/>
  <rect y="490"  width="1440" height="110" fill="url(#fadeBottom)" opacity="1"/>
</svg>
